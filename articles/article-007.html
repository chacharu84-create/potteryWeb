<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>以前的土：尋訪磚窯廠與在地土質的記憶 | 土手製陶</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif; color: #333; background: #fff; }
    .navbar {
      display: flex !important; align-items: center; justify-content: space-between;
      padding: 0 2rem !important; height: 64px; border-bottom: 1px solid #e5e5e5;
      position: sticky; top: 0; background: #fff; z-index: 100;
    }
    .navbar-brand { text-decoration: none; color: #333; font-size: 1.1rem; font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .navbar-brand:hover { color: #C8342A; }
    .logo-icon { width: 32px; height: 32px; border-radius: 50%; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      font-family: 'Microsoft JhengHei', '微軟正soft正黑體', sans-serif;
      font-size: 0.95rem; color: #444; padding: 0; text-decoration: none;
    }
    .nav-btn:hover { color: #C8342A; }
    .nav-btn.dropdown-toggle::after { vertical-align: middle; }
    .dropdown-menu { border: 1px solid #e5e5e5 !important; border-radius: 6px !important; box-shadow: 0 8px 24px rgba(0,0,0,0.08) !important; min-width: 120px; padding: 6px 0 !important; }
    .dropdown-item { font-family: 'Microsoft JhengHei', '微軟正黑體', sans-serif !important; font-size: 0.9rem !important; color: #444 !important; padding: 10px 20px !important; }
    .dropdown-item:hover, .dropdown-item:focus { background: #FDF0EF !important; color: #C8342A !important; }
    .article-container { max-width: 760px; margin: 3rem auto; padding: 0 1.5rem; }
    .category-tag { display: inline-block; font-size: 0.8rem; color: #C8342A; border: 1px solid #C8342A; padding: 2px 10px; border-radius: 2px; margin-bottom: 1rem; }
    .article-title { font-size: 2rem; line-height: 1.4; margin-bottom: 0.5rem; font-weight: 700; color: #222; }
    .meta { font-size: 0.85rem; color: #888; margin-bottom: 2rem; }
    .thumbnail { width: 100%; aspect-ratio: 16/9; border-radius: 4px; margin-bottom: 2rem; overflow: hidden; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .content { font-size: 1rem; line-height: 2; color: #444; }
    .content p { margin-bottom: 1.5rem; }
    .back-link { display: inline-block; margin-top: 3rem; color: #C8342A; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/potteryWeb/" class="navbar-brand">
      <img src="/potteryWeb/images/logo.jpg" class="logo-icon" alt="土手製陶 Logo" />
      土手製陶
    </a>
    <div class="nav-links">
      <div class="dropdown">
        <button class="nav-btn dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
          製陶紀錄
        </button>
        <ul class="dropdown-menu dropdown-menu-end" id="category-dropdown"></ul>
      </div>
      <a href="/potteryWeb/#/contact" class="nav-btn">聯絡我們</a>
    </div>
  </nav>

  <script>
    fetch('/potteryWeb/category.json')
      .then(r => r.json())
      .then(cats => {
        const ul = document.getElementById('category-dropdown')
        cats.forEach(cat => {
          const li = document.createElement('li')
          li.innerHTML = `<a class="dropdown-item" href="/potteryWeb/#/articles/${cat.id}">${cat.name}</a>`
          ul.appendChild(li)
        })
      })
      .catch(console.error)
  </script>

  <div class="article-container">
    <span class="category-tag">田野</span>
    <h1 class="article-title">以前的土</h1>
    <p class="meta">2026年4月5日</p>
    <div class="thumbnail">
      <img src="../images/article-007-cover.jpg" alt="田野調查現場" />
    </div>
    <div class="content">
      <p>從光復以前有許多大大小小的磚窯廠歷史背景，就可以看出來這個地方的土質，適合用來製作成陶土或各種磚頭。</p>
      <p>這次土手製陶團隊，跟著 Ina 田野調查的路上的其中一塊地，也曾是磚窯廠的所屬地。只是如今受生活方式轉變及政府政策等因素影響之下，這塊地如今也只剩雜草叢生，沒有人為整理的痕跡。</p>
      <div class="thumbnail">
        <img src="../images/article-007-cover02.jpg" alt="田野調查現場" />
      </div>
      <p>許多紀錄，一旦久了沒有人提起，就會自然消失，而許多往事，唯有不斷地提起、講述，才得以流傳至今。</p>
    </div>
    <a href="/potteryWeb/" class="back-link">← 返回首頁</a>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
